<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Sports Club</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>Active Sports Club</h1>
    <p>Join our sports club and stay healthy</p>

    <h2>Training Schedule</h2>
    <table border="1">
        <thead>
            <th>Sport</th>
            <th>Day</th>
            <th>Time</th>
        </thead>
        <tr>
            <th>Football</th>
            <th>Monday</th>
            <th>18:00</th>
        </tr>
        <tr>
            <th>Basketball</th>
            <th>Wednesday</th>
            <th>17:00</th>
        </tr>
        <tr>
            <th>Swimming</th>
            <th>Friday</th>
            <th>16:00</th>
        </tr>
    </table>
    <h2>Membership Form</h2>
    <form>
        <label>
            Name:

            <br>
            <br>
            <input type="text">
        </label>

        <br>
        <br>
        <label>
            Age:

            <br>
            <br>
            <input type="text">
        </label>

        <br>
        <br>
        Choose Sport

        <br>
        <br>
        <select>
            <option value="Football">Football</option>
            <option value="Basketball">Basketball</option>
            <option value="Swimming">Swimming</option>
        </select>

        <br>
        <br>
        Comment

        <br>
        <br>
        <textarea rows="3"></textarea>
        <br>
        <input type="submit" value="Join Club">
    </form>
</body>
</html>
