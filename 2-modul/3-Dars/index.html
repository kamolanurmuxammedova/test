<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Poster</title>
  </head>
  <body>
    <div class="hero">
      <h1>Explore the World</h1>
    </div>

    <div class="section">
      <h2>Why Travel With Us?</h2>
      <p>Discover the most beautiful places around the world.</p>
      <p>Comfortable trips with professional guides.</p>
    </div>

    <div class="section">
      <h2>Travel Plans</h2>
      <table>
        <tr>
          <th>Destination</th>
          <th>Days</th>
          <th>Price</th>
        </tr>
        <tr>
          <td>Paris</td>
          <td>5</td>
          <td>$1200</td>
        </tr>
        <tr>
          <td>Dubai</td>
          <td>4</td>
          <td>$900</td>
        </tr>
        <tr>
          <td>Maldivies</td>
          <td>6</td>
          <td>$1800</td>
        </tr>
      </table>
    </div>

    <div class="form-section">
      <h2>Book Your Trip</h2>

      <form>
        <label>Name:</label><br />
        <input type="text" /><br /><br />

        <label>Email:</label><br />
        <input type="email" /><br /><br />

        <label>Destination:</label><br />
        <select>
          <option>Paris</option>
          <option>Rome</option>
          <option>Tokyo</option></select
        ><br /><br />

        <button type="submit">Send</button>
      </form>
    </div>
  </body>
</html>
