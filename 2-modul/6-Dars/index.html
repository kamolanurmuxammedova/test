<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Кофейня</title>
  </head>
  <body>
    <div class="contenier">
      <h1 class="title-card">
        Special menu <span class="title-span">for you</span>
      </h1>
      <div class="card">
        <img src="./продукты4.png" class="card-img" />

        <div class="card-title-wrapper"></div>
        <h2 class="card-title card-title-left">Sandwich</h2>
        <h2 class="card-title">12K</h2>
        <p class="card-paragraph">Bread with meat and vegetables</p>
        <input type="button" value="buy" class="buttons" />
      </div>
      <div class="card">
        <img src="./продукты3.png" class="card-img" />

        <div class="card-title-wrapper"></div>
        <h2 class="card-title card-title-left">Hot Milk</h2>
        <h2 class="card-title">12K</h2>
        <p class="card-paragraph">Hot Milk with less sugar</p>
        <input type="button" value="buy" class="buttons" />
      </div>
      <div class="card">
        <img src="./продукты6.png" class="card-img" />

        <div class="card-title-wrapper"></div>
        <h2 class="card-title card-title-top">Coffee Ice cream</h2>
        <h2 class="card-title">12K</h2>
        <p class="card-paragraph">Coffee with Ice cream vanilla</p>
        <input type="button" value="buy" class="buttons" />
      </div>
    </div>
    <div class="contenier-two">
      <div class="card">
        <img src="./продукты2.png" class="card-img" />

        <div class="card-title-wrapper"></div>
        <h2 class="card-title card-title-right">Cappuccino</h2>
        <h2 class="card-title">12K</h2>
        <p class="card-paragraph">Hot Cappuccino</p>
        <input type="button" value="buy" class="buttons" />
      </div>
      <div class="card">
        <img src="./продукты1.png" class="card-img" />

        <div class="card-title-wrapper"></div>
        <h2 class="card-title card-title-right">Moccacino</h2>
        <h2 class="card-title">12K</h2>
        <p class="card-paragraph">Hot Moccacino</p>
        <input type="button" value="buy" class="buttons" />
      </div>
      <div class="card">
        <img src="./продукты5.png" class="card-img" />

        <div class="card-title-wrapper"></div>
        <h2 class="card-title card-title-top">Waffle ice cream</h2>
        <h2 class="card-title">12K</h2>
        <p class="card-paragraph">Waffle with ice cream</p>
        <input type="button" value="buy" class="buttons" />
      </div>
    </div>
  </body>
</html>
